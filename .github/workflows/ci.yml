name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the Go toolchain and golangci-lint pinned in mise.toml (cached).
      - uses: jdx/mise-action@v2

      - name: Lint + test
        run: mise run check        # gofmt + golangci-lint + go test

      - name: Build
        run: mise run build

      - name: Cross-compile (macOS, Windows)
        run: |
          for t in darwin/amd64 darwin/arm64 windows/amd64; do
            echo "building $t"
            GOOS="${t%/*}" GOARCH="${t#*/}" CGO_ENABLED=0 go build -o /dev/null ./cmd/sbx
          done
